# ── Prefix ────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────
set -g escape-time 10           # fix: neovim ESC delay
set -g focus-events on          # needed for neovim autoread
set -g history-limit 50000      # increased from 10000
set -g set-clipboard on
set -g mouse on
set -g default-terminal "screen-256color"                      

# ── Indexing ──────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Split panes (preserve current path) ───────────────────
bind | split-window -h -c "#{pane_current_path}"   # fix: was losing cwd
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation ─────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Window navigation ─────────────────────────────────────
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ── Resize panes ──────────────────────────────────────────
bind -r H resize-pane -L 5 
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Misc binds ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"
bind Q kill-session

# ── Copy mode (vi keys) ───────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
