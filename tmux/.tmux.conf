# ── Prefix ────────────────────────────────────────────────
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ── General ───────────────────────────────────────────────
set -g escape-time 10           # fix: neovim ESC delay
set -g focus-events on          # needed for neovim autoread
set -g history-limit 50000      # increased from 10000
# set -g default-terminal "tmux-256color"         # fix: true color support
# set -as terminal-overrides ',xterm-256color:Tc'
set -g set-clipboard on
set -g mouse on

# ── Indexing ──────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Split panes (preserve current path) ───────────────────
bind | split-window -h -c "#{pane_current_path}"   # fix: was losing cwd
bind - split-window -v -c "#{pane_current_path}"

# ── Pane navigation (choose ONE approach) ─────────────────
# Option A: keep manual binds, remove vim-tmux-navigator plugin
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Option B: use vim-tmux-navigator (recommended — handles vim splits too)
# Install plugin below, it auto-binds Ctrl+h/j/k/l

# ── Window navigation ─────────────────────────────────────
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# ── Resize panes ──────────────────────────────────────────
bind -r H resize-pane -L 5     # using prefix+H/J/K/L instead of bare Ctrl
bind -r J resize-pane -D 2     # avoids conflicts with terminal shortcuts
bind -r K resize-pane -U j
bind -r L resize-pane -R 5

# ── Misc binds ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded!"
bind Q kill-session

# ── Copy mode (vi keys) ───────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Status bar ────────────────────────────────────────────
set -g status-bg colour235
set -g status-fg white
set -g status-interval 5        # refresh every 5s instead of default 15s
set -g status-left-length 60
set -g status-right-length 60

# fix: show git branch of active pane's directory
set -g status-left "#[fg=green]#S #[fg=yellow]#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)"
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M"  # removed useless "Claude AI" label
