# wsl.conf — place at  /etc/wsl.conf  INSIDE the distro (sudo cp wsl/wsl.conf /etc/wsl.conf)
# Per-distro settings. Run `wsl --shutdown` in PowerShell after editing.

[boot]
# Enable systemd so `systemctl` and service units (docker, etc.) work.
systemd=true

[user]
# Default login user when you open the distro.
default=locphan

[interop]
# Keep Windows PATH off the Linux PATH to avoid slow `/mnt/c` lookups and name clashes.
# You can still call Windows exes explicitly (e.g. explorer.exe, code.exe).
appendWindowsPath=false

[automount]
# Mount Windows drives under /mnt and honor mount options.
enabled=true
options=metadata,umask=22,fmask=11
